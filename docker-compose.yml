# ============================================================
# Portal de Relatórios WMI — Stack completa local
# Uso: cp .env.example .env  →  preencha  →  docker compose up -d
# Secrets vêm do .env (NÃO commitado). Nenhuma credencial neste arquivo.
# ============================================================

services:

  # ── Banco de dados ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wmi-relatorios-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Object storage (MinIO) ──────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: wmi-relatorios-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web (acesse: http://localhost:9001)
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      # 'curl' foi removido da imagem minio/minio (nov/2023). Usa o cliente 'mc',
      # incluído na própria imagem, que verifica a prontidão do servidor local.
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────
  backend:
    build: ./backend
    container_name: wmi-relatorios-backend
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_URL:         http://minio:9000
      MINIO_ACCESS_KEY:  ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY:  ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET:      relatorios
      FRONTEND_URL:      ${FRONTEND_URL}
      APP_ENV:           ${APP_ENV}
      DEV_USER_EMAIL:    ${DEV_USER_EMAIL}
      ADMIN_EMAILS:      ${ADMIN_EMAILS}
      MAX_UPLOAD_MB:     ${MAX_UPLOAD_MB}
      INTERNAL_PROXY_SECRET: ${INTERNAL_PROXY_SECRET}
    ports:
      - "8000:8000"
    mem_limit: 512m
    cpus: 0.5
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend (nginx + reverse-proxy para o backend) ──────
  frontend:
    build: ./frontend
    container_name: wmi-relatorios-frontend
    restart: unless-stopped
    environment:
      API_UPSTREAM:          ${API_UPSTREAM}
      INTERNAL_PROXY_SECRET: ${INTERNAL_PROXY_SECRET}
    ports:
      - "3000:80"
    mem_limit: 128m
    cpus: 0.25
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
  minio_data:
